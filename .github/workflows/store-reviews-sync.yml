name: Sync Store Reviews

on:
  schedule:
    - cron: "15 6 * * *"
  workflow_dispatch:
    inputs:
      apple_app_id:
        description: "Apple App ID numerico (trackId)"
        required: false
        type: string
      google_play_app_id:
        description: "Package Android (ej: com.zentavo.control_gastos)"
        required: false
        default: "com.zentavo.control_gastos"
        type: string

permissions:
  contents: write

jobs:
  sync-reviews:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate required variables
        env:
          APPLE_APP_ID: ${{ github.event.inputs.apple_app_id || vars.APPLE_APP_ID }}
          GOOGLE_PLAY_APP_ID: ${{ github.event.inputs.google_play_app_id || vars.GOOGLE_PLAY_APP_ID || 'com.zentavo.control_gastos' }}
        run: |
          if [ -z "$APPLE_APP_ID" ]; then
            echo "ERROR: falta APPLE_APP_ID. Cargalo en Run workflow (apple_app_id) o en Settings > Secrets and variables > Actions > Variables"
            exit 1
          fi

          if [ -z "$GOOGLE_PLAY_APP_ID" ]; then
            echo "ERROR: falta GOOGLE_PLAY_APP_ID. Cargalo en Run workflow o en Variables"
            exit 1
          fi

      - name: Install sync dependencies
        run: npm ci
        working-directory: scripts/review-sync

      - name: Pull reviews from stores
        env:
          APPLE_APP_ID: ${{ github.event.inputs.apple_app_id || vars.APPLE_APP_ID }}
          GOOGLE_PLAY_APP_ID: ${{ github.event.inputs.google_play_app_id || vars.GOOGLE_PLAY_APP_ID || 'com.zentavo.control_gastos' }}
          REVIEWS_OUTPUT: docs/assets/reviews.json
          MAX_REVIEWS: 24
        run: npm run sync
        working-directory: scripts/review-sync

      - name: Commit updated reviews
        run: |
          if git diff --quiet docs/assets/reviews.json; then
            echo "Sin cambios en reseñas"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/assets/reviews.json
          git commit -m "chore: sync store reviews"
          git push
