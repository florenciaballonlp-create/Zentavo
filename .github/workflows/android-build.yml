name: 🤖 Android Build

on:
  push:
    branches: [ main ]
    paths:
      - 'lib/**'
      - 'android/**'
      - 'assets/**'
      - 'pubspec.yaml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    name: 🤖 Build Android APK
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🔧 Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: 📱 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      
      - name: 📦 Install dependencies
        run: flutter pub get
      
      - name: 🔍 Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true
      
      - name: 🧪 Run tests
        run: flutter test
        continue-on-error: true
      
      - name: 🏗️ Build APK
        run: flutter build apk --release
      
      - name: 🏗️ Build App Bundle (AAB)
        run: flutter build appbundle --release
      
      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Zentavo-Android-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90
      
      - name: 📤 Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: Zentavo-Android-AAB
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 90
      
      - name: 📊 APK Info
        run: |
          echo "### 📦 Build Information" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**APK Size:** $(du -h build/app/outputs/flutter-apk/app-release.apk | cut -f1)" >> $GITHUB_STEP_SUMMARY
          echo "**AAB Size:** $(du -h build/app/outputs/bundle/release/app-release.aab | cut -f1)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Android build completed successfully!**" >> $GITHUB_STEP_SUMMARY


# ========================================
# BUILD FIRMADO (ACTIVADO)
# ========================================
  build-android-signed:
    name: 🤖 Build Android (Signed for Play Store)
    runs-on: ubuntu-latest
    needs: build-android
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🔧 Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: 📱 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      - name: 📦 Install dependencies
        run: flutter pub get
      
      - name: 🔑 Setup Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties

      - name: 🔎 Verify signing certificate SHA1
        run: |
          echo "Alias configurado en secret: ${{ secrets.ANDROID_KEY_ALIAS }}"
          echo "--- Entradas del keystore (alias + SHA1) ---"
          keytool -list -v \
            -keystore android/app/upload-keystore.jks \
            -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" | grep -E 'Alias name:|SHA1:' || true
          echo "--- SHA1 para alias configurado ---"
          keytool -list -v \
            -keystore android/app/upload-keystore.jks \
            -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -alias "${{ secrets.ANDROID_KEY_ALIAS }}" | grep 'SHA1:' || true

      - name: ✅ Validate signing credentials
        run: |
          keytool -list -v \
            -keystore android/app/upload-keystore.jks \
            -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -alias "${{ secrets.ANDROID_KEY_ALIAS }}" \
            -keypass "${{ secrets.ANDROID_KEY_PASSWORD }}" > /tmp/keytool_check.txt
          grep 'SHA1:' /tmp/keytool_check.txt
      
      - name: 🏗️ Build signed App Bundle
        run: flutter build appbundle --release
      
      - name: 📤 Upload signed App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: Zentavo-Android-AAB-Signed
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 90
      
      - name: 🧹 Cleanup
        if: always()
        run: rm -f android/app/upload-keystore.jks android/key.properties

